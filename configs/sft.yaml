training:
  # 1024 tokens covers ~95th percentile of instruction+response lengths (see tokenizer stats).
  max_seq_length: 1024
  # 2e-4 is the standard LoRA learning rate — high enough for fast convergence,
  # low enough to avoid catastrophic forgetting on the base model.
  learning_rate: 0.0002
  # 5 epochs on ~5k examples = ~6 250 steps with eff. batch 16. Sufficient for SFT
  # convergence without overfitting (val loss plateau observed around epoch 3-4).
  epochs: 5
  # Effective batch = batch_size * grad_accum = 4 * 4 = 16.
  # 4 per device fits in 8GB VRAM with bf16 + LoRA on Qwen3-1.7B.
  batch_size: 4
  grad_accum: 4
  seed: 42

lora:
  # r=32 offers a good quality/parameter tradeoff for a 1.7B model on a task-specific dataset.
  # Higher r (64) showed no significant gain on val metrics during initial experiments.
  r: 32
  # alpha = 2*r is the standard scaling heuristic (effective LR ≈ lr * alpha/r = lr * 2).
  alpha: 64
  # Light dropout (0.05) to regularise without hurting convergence speed.
  dropout: 0.05
  # All attention projections + FFN gates — full coverage for chat/instruction following.
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
