training:
  max_seq_length: 1024
  # beta=0.3: validated configuration (Run D, 2026-04-09) — 4/4 clinical criteria passed.
  # Higher values (beta=0.5, beta=1.0) caused mode collapse to "max" because the strong
  # KL constraint kept the model close to an SFT reference already biased toward "max",
  # amplifying the bias instead of correcting it.
  beta: 0.3
  # Reduced from 1e-5 — more conservative update on ~1000 balanced pairs.
  learning_rate: 0.000005
  epochs: 1
  # batch_size=1 after OOM at step 46/57 with DPO pairs (longer sequences than SFT).
  # Effective batch = batch_size * grad_accum = 1 * 16 = 16 (same as SFT).
  batch_size: 1
  grad_accum: 16
  seed: 42

lora:
  # r=16: reduced from 32 to limit reward-hacking capacity on small DPO dataset (~1000 pairs).
  # r=16 with alpha=32 maintains the standard scaling ratio (effective LR ≈ lr * alpha/r = 2x).
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
