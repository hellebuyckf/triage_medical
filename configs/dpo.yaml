training:
  # Same max_seq_length as SFT — DPO sequences (prompt+chosen/rejected) fit within 1024.
  max_seq_length: 1024
  # KL penalty coefficient. 0.5 chosen after mode collapse observed at beta=0.1 (Run B):
  # model collapsed to predicting "deferred" for ~95% of examples (-25.5% accuracy vs SFT).
  # Stronger KL constraint keeps DPO closer to the SFT reference and prevents reward hacking.
  beta: 0.5
  # Reduced from 5e-5 after reward hacking at higher LR — conservative adjustment on SFT base.
  learning_rate: 0.00002
  # Reduced from 2 — fewer epochs limit drift from SFT reference on small dataset (~900 pairs).
  epochs: 1
  # Effective batch = batch_size * grad_accum = 1 * 16 = 16 (same as SFT).
  # batch_size=1 after OOM at step 46/57 with new DPO pairs (longer sequences).
  batch_size: 1
  grad_accum: 16
  seed: 42

lora:
  # Same LoRA config as SFT for consistency. The adapter is stacked on top of the SFT-merged
  # model, so architectural parameters should not change between stages.
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
