name: CI - Serving App & Infrastructure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-quality:
    name: Python Quality (Lint, Type, Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv sync --extra serving --extra dev --extra gcp

      - name: Lint with Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check with Pyright
        run: |
          uv run pyright

      - name: Run Serving tests (Mocked vLLM)
        run: |
          uv run pytest tests/test_serving.py

  terraform-quality:
    name: Terraform Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  docker-lint:
    name: Docker Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Lint Root Dockerfile (Serving API)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3013 # Ignorer les avertissements sur les versions de paquets (standard pour les POC)

      - name: Lint MLflow Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/mlflow/Dockerfile
          ignore: DL3008,DL3013

      - name: Check Docker Compose configuration
        run: docker compose config -q
